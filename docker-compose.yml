version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: aws-batch-etl-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: legacy_insurance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./source_db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d legacy_insurance"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
